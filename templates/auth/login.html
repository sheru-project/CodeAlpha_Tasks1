{% extends 'base.html' %}

{% block title %}Login - SocialSphere{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <h2>Welcome Back</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Login</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
</div>
{% endblock %}
